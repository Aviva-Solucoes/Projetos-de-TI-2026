<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfólio de Projetos — Diretoria de TI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>

:root{
  --navy-900:#071a35;
  --navy-800:#0b2545;
  --navy-700:#123566;
  --navy-600:#1c4c8c;
  --accent:#2f6fed;
  --accent-soft:#e8f0fe;
  --bg:#eef1f6;
  --surface:#ffffff;
  --surface-alt:#f6f8fb;
  --border:#e1e6ef;
  --text:#101828;
  --text-muted:#5b6472;
  --text-faint:#8a93a3;
  --red:#d9364a;
  --red-soft:#fdecef;
  --amber:#dd8f1f;
  --amber-soft:#fdf3e0;
  --green:#1f9d63;
  --green-soft:#e8f8f0;
  --radius-lg:16px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow-sm:0 1px 2px rgba(11,37,69,.06);
  --shadow-md:0 4px 16px rgba(11,37,69,.08);
  --shadow-lg:0 12px 32px rgba(11,37,69,.14);
  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;color:var(--navy-900)}
p{margin:0}
button{font-family:inherit;cursor:pointer}
select,input{font-family:inherit}
::selection{background:var(--accent-soft)}

.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:264px;flex-shrink:0;
  background:linear-gradient(180deg,var(--navy-800),var(--navy-900));
  color:#fff;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  z-index:40;
}
.brand{display:flex;align-items:center;gap:12px;padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-mark{
  width:40px;height:40px;border-radius:10px;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:15px;
  letter-spacing:.5px;flex-shrink:0;
  border:1px solid rgba(255,255,255,.18);
}
.brand-mark img{width:100%;height:100%;object-fit:contain;border-radius:10px}
.brand-text{display:flex;flex-direction:column;line-height:1.3}
.brand-text strong{font-family:var(--font-display);font-size:14.5px;font-weight:700}
.brand-text span{font-size:11.5px;color:rgba(255,255,255,.55)}

.nav{display:flex;flex-direction:column;gap:2px;padding:14px 12px;flex:1;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:10px;
  background:transparent;border:none;color:rgba(255,255,255,.72);
  padding:10px 12px;border-radius:9px;text-align:left;
  font-size:13.5px;font-weight:500;transition:.15s;
}
.nav-item .nav-ico{font-size:14px;width:16px;text-align:center;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}

.sidebar-foot{padding:16px 18px 20px;border-top:1px solid rgba(255,255,255,.08)}
.rag-mini{display:flex;height:8px;border-radius:6px;overflow:hidden;margin-bottom:10px;background:rgba(255,255,255,.08)}
.rag-mini span{height:100%}
.update-line{font-size:11px;color:rgba(255,255,255,.5);font-family:var(--font-mono)}

.sidebar-scrim{display:none;position:fixed;inset:0;background:rgba(7,26,53,.5);z-index:35}

/* MAIN COLUMN */
.main-col{flex:1;min-width:0;display:flex;flex-direction:column}

.topbar{
  display:flex;align-items:center;gap:18px;
  padding:18px 28px;background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;
  flex-wrap:wrap;
}
.hamburger{display:none;background:none;border:none;font-size:20px;color:var(--navy-800)}
.topbar-title{flex:1;min-width:220px}
.topbar-title h1{font-size:21px;font-weight:700}
.topbar-title p{font-size:12.5px;color:var(--text-muted);margin-top:2px}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-box input{
  width:280px;max-width:60vw;padding:9px 14px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface-alt);
  font-size:13px;color:var(--text);
}
.search-box input:focus{outline:2px solid var(--accent);outline-offset:1px;background:#fff}
.btn-refresh{
  display:flex;align-items:center;gap:7px;
  background:var(--navy-800);color:#fff;border:none;
  padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow-sm);
}
.btn-refresh:hover{background:var(--navy-700)}
.spin{display:inline-block}
.spin.loading{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.filter-bar{
  display:flex;flex-wrap:wrap;gap:8px;
  padding:12px 28px;background:var(--surface-alt);
  border-bottom:1px solid var(--border);
}
.filter-bar select{
  padding:7px 10px;border-radius:8px;border:1px solid var(--border);
  background:#fff;font-size:12.5px;color:var(--text);max-width:190px;
}
.chip-clear{
  background:none;border:1px dashed var(--text-faint);color:var(--text-muted);
  border-radius:8px;padding:7px 12px;font-size:12px;
}
.chip-clear:hover{border-color:var(--red);color:var(--red)}

.view-container{padding:24px 28px 60px;max-width:1440px;width:100%;margin:0 auto}
.view{display:none}
.view.active{display:block;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:120px 20px;color:var(--text-muted)}
.loading-pulse{width:44px;height:44px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin 0.8s linear infinite}

/* SECTION HEADERS */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:32px 0 14px;gap:12px;flex-wrap:wrap}
.section-head:first-child{margin-top:0}
.section-head h2{font-size:16.5px;font-weight:700}
.section-head .section-note{font-size:12px;color:var(--text-faint)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:16px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
}
.kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.kpi-card.k-red::before{background:var(--red)}
.kpi-card.k-amber::before{background:var(--amber)}
.kpi-card.k-green::before{background:var(--green)}
.kpi-label{font-size:11.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi-value{font-family:var(--font-display);font-size:30px;font-weight:700;margin-top:6px;color:var(--navy-900)}
.kpi-value span{font-size:15px;font-weight:600;color:var(--text-faint)}
.kpi-sub{font-size:11.5px;color:var(--text-faint);margin-top:4px;font-family:var(--font-mono)}

/* RAG STRIP (signature element) */
.rag-strip-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;box-shadow:var(--shadow-sm)}
.rag-strip-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.rag-strip-top h3{font-size:13px;font-weight:700;color:var(--navy-900)}
.rag-strip-top span{font-family:var(--font-mono);font-size:11.5px;color:var(--text-faint)}
.rag-strip{display:flex;height:22px;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.rag-seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:10.5px;font-weight:700;font-family:var(--font-mono);transition:.3s}
.rag-legend{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.rag-legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-muted)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* GRID LAYOUTS */
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* EXEC SUMMARY LISTS */
.exec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;box-shadow:var(--shadow-sm)}
.exec-card h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.exec-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
.exec-list li{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:8px 10px;border-radius:8px;background:var(--surface-alt);cursor:pointer;transition:.15s}
.exec-list li:hover{background:var(--accent-soft)}
.exec-list .el-name{font-weight:600;color:var(--text)}
.exec-list .el-meta{color:var(--text-faint);font-size:11px;font-family:var(--font-mono)}
.badge{padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;font-family:var(--font-mono);white-space:nowrap}
.badge-red{background:var(--red-soft);color:var(--red)}
.badge-amber{background:var(--amber-soft);color:var(--amber)}
.badge-green{background:var(--green-soft);color:var(--green)}
.badge-neutral{background:var(--surface-alt);color:var(--text-muted);border:1px solid var(--border)}

/* PROJECT CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.pcard{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.18s;
  display:flex;flex-direction:column;gap:10px;position:relative;
}
.pcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent)}
.pcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pcard-code{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.3px}
.pcard-title{font-family:var(--font-display);font-size:14.5px;font-weight:700;line-height:1.3;margin-top:2px;color:var(--navy-900)}
.pcard-tier{font-family:var(--font-mono);font-size:10px;background:var(--surface-alt);border:1px solid var(--border);padding:2px 7px;border-radius:6px;color:var(--text-muted);flex-shrink:0}
.pcard-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;font-size:11.5px;color:var(--text-muted)}
.pcard-meta b{color:var(--text);font-weight:600}
.pcard-bars{display:flex;flex-direction:column;gap:5px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-row .bar-label{font-size:10px;width:64px;color:var(--text-faint);font-family:var(--font-mono);flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--surface-alt);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-fill.evo{background:var(--accent)}
.bar-fill.plan{background:var(--text-faint)}
.bar-row .bar-pct{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);width:32px;text-align:right;flex-shrink:0}
.pcard-flag{font-size:10.5px;color:var(--red);font-weight:600;display:flex;align-items:center;gap:5px}
.pcard-next{font-size:11.5px;color:var(--text-muted);border-top:1px dashed var(--border);padding-top:9px;line-height:1.4}
.pcard-next b{color:var(--text)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-faint);font-size:13.5px}

/* CAPACITY */
.analyst-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;box-shadow:var(--shadow-sm);cursor:pointer}
.analyst-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.analyst-name{font-family:var(--font-display);font-weight:700;font-size:14px}
.analyst-pct{font-family:var(--font-mono);font-weight:700;font-size:13px}
.cap-track{height:9px;background:var(--surface-alt);border-radius:5px;overflow:hidden;margin-bottom:10px}
.cap-fill{height:100%;border-radius:5px;transition:.3s}
.analyst-stats{display:flex;gap:14px;font-size:11px;color:var(--text-muted);flex-wrap:wrap}
.analyst-stats span b{color:var(--text);font-family:var(--font-mono)}
.analyst-projects{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);display:flex;flex-wrap:wrap;gap:6px}
.mini-tag{font-size:10.5px;background:var(--surface-alt);border:1px solid var(--border);padding:3px 8px;border-radius:6px;color:var(--text-muted)}

/* TABLE (Gerente/PMO view) */
.data-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.data-table th{background:var(--navy-800);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding:11px 14px;text-align:left;font-weight:600}
.data-table td{padding:11px 14px;font-size:12.5px;border-bottom:1px solid var(--border);color:var(--text)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr.tbl-row{cursor:pointer}
.data-table tr.tbl-row:hover td{background:var(--surface-alt)}
.owner-block{margin-bottom:26px}
.owner-header{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px 10px 0 0;padding:12px 16px;cursor:pointer}
.owner-header h3{font-size:13.5px;font-weight:700}
.owner-header .owner-count{font-family:var(--font-mono);font-size:11.5px;color:var(--text-muted)}

/* CHARTS */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;box-shadow:var(--shadow-sm)}
.chart-card h3{font-size:12.5px;font-weight:700;margin-bottom:12px;color:var(--navy-900)}
.chart-card canvas{max-height:280px}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:14px}

/* RISKS */
.risk-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 16px;margin-bottom:10px;cursor:pointer}
.risk-item.sev-alto{border-left-color:var(--red)}
.risk-item.sev-medio{border-left-color:var(--amber)}
.risk-item.sev-baixo{border-left-color:var(--green)}
.risk-item-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:4px}
.risk-item-top strong{font-size:13px;font-family:var(--font-display)}
.risk-item p{font-size:12px;color:var(--text-muted);line-height:1.5}

/* MODAL ONE-PAGE */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(7,20,40,.6);
  z-index:100;padding:26px;overflow-y:auto;backdrop-filter:blur(2px);
}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal-onepage{
  background:var(--surface);border-radius:18px;max-width:920px;width:100%;
  box-shadow:var(--shadow-lg);overflow:hidden;margin:20px 0;
}
.op-header{background:linear-gradient(135deg,var(--navy-800),var(--navy-900));color:#fff;padding:26px 30px}
.op-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.op-code{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.6);text-transform:uppercase}
.op-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-top:4px;line-height:1.25}
.op-close{background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;flex-shrink:0}
.op-close:hover{background:rgba(255,255,255,.22)}
.op-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.op-badges .badge{font-size:11px;padding:4px 10px}
.op-body{padding:26px 30px}
.op-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
.op-stat{background:var(--surface-alt);border-radius:10px;padding:12px 14px}
.op-stat .lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.op-stat .val{font-family:var(--font-mono);font-size:16px;font-weight:700;margin-top:3px;color:var(--navy-900)}
.op-section{margin-bottom:22px}
.op-section h4{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);margin-bottom:9px;font-weight:700}
.op-section p{font-size:13px;line-height:1.6;color:var(--text)}
.op-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.op-list li{font-size:12.5px;line-height:1.5;padding-left:16px;position:relative;color:var(--text)}
.op-list li::before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.op-two{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:640px){.op-two{grid-template-columns:1fr}}
.op-risk{background:var(--surface-alt);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px}
.op-risk b{display:inline-block;margin-right:6px}

.op-objetivo{font-size:13px;color:rgba(255,255,255,.75);font-style:italic;margin-top:9px;line-height:1.55;max-width:640px}
.op-badges-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:8px 14px}
.op-updated{font-size:11px;color:rgba(255,255,255,.55);font-family:var(--font-mono);white-space:nowrap}

.op-progress-block{margin-bottom:24px}
.op-progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.op-progress-top .lbl{font-size:11.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
.op-progress-top .val{font-family:var(--font-mono);font-size:21px;font-weight:700;color:var(--navy-900)}
.op-progress-track{height:11px;border-radius:6px;background:var(--surface-alt);overflow:hidden;position:relative;border:1px solid var(--border)}
.op-progress-fill{height:100%;border-radius:5px}
.op-progress-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--navy-900);opacity:.55}
.op-progress-sub{margin-top:7px;font-size:11px;color:var(--text-faint);font-family:var(--font-mono);display:flex;align-items:center;gap:6px}
.op-progress-sub .marker-dot{width:7px;height:7px;border-radius:1px;background:var(--navy-900);opacity:.55;display:inline-block}

.op-team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.op-team-card{background:var(--surface-alt);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.op-team-card .lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.op-team-card .val{font-family:var(--font-display);font-size:13.5px;font-weight:700;margin-top:5px;color:var(--navy-900);line-height:1.35}

.op-kv-card{background:var(--surface-alt);border-radius:10px;padding:15px 16px;border:1px solid var(--border);height:100%}
.op-kv-card h4{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);margin-bottom:11px;font-weight:700}
.op-kv-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--border)}
.op-kv-row:last-child{border-bottom:none;padding-bottom:0}
.op-kv-row:first-child{padding-top:0}
.op-kv-row .k{color:var(--text-muted)}
.op-kv-row .v{font-weight:700;color:var(--text);font-family:var(--font-mono);text-align:right}
.op-kv-sub{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* ============ HELPERS ============ */
function splitList(v){
  if(v===null||v===undefined) return [];
  return String(v).split('|').map(s=>s.trim()).filter(Boolean);
}
function num(v){
  if(v===null||v===undefined||v==='') return null;
  const n = typeof v === 'number' ? v : parseFloat(String(v).replace(',','.'));
  return isNaN(n) ? null : n;
}
function fmtDate(s){
  if(!s) return '—';
  const d = new Date(s);
  if(isNaN(d.getTime())) return s;
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtMoney(v){
  if(v===null||v===undefined||v==='') return '—';
  const n = num(v);
  if(n===null) return String(v);
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
}
function esc(s){
  const d=document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML;
}
function uniqSorted(arr){ return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR')); }

    const txt = get('risco'+i+'_texto');

  }
  const sm = statusMeta(get('status'));

    id: get('id'),
    nome: get('nome_projeto') || get('id'),

    resumo: get('Resumo Executivo') || '',
    ultimaAtualizacao: get('ultima_atualizacao'),
    responsavel: get('responsavel') || '',
    atrasado: (evolucao!==null && planejado!==null && evolucao < planejado)
  };
}

/* ============ DATA LOADING ============ */
function loadData(){
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('views').style.display = 'none';

  if(CONFIG.SHEET_CSV_URL && CONFIG.SHEET_CSV_URL.trim()){
    // cache-buster: garante que "Atualizar agora" e o load inicial sempre peguem a versão mais recente
    // publicada no Google Sheets, e não uma cópia em cache do navegador/CDN.
    const bustUrl = CONFIG.SHEET_CSV_URL.trim() + (CONFIG.SHEET_CSV_URL.includes('?') ? '&' : '?') + 'cb=' + Date.now();
    Papa.parse(bustUrl, {
      download: true, header: true, skipEmptyLines: true,
      complete: (res) => {
        try{
          const rows = res.data.filter(r => r.id && String(r.id).trim());
          RAW = rows.map(normalizeRow);
          onDataReady();
        }catch(e){ console.error(e); RAW = SEED_DATA.map(normalizeRow); onDataReady(true); }
      },
      error: () => { RAW = SEED_DATA.map(normalizeRow); onDataReady(true); }
    });
  } else {
    RAW = SEED_DATA.map(normalizeRow);
    onDataReady(true);
  }
}

function onDataReady(usedFallback){
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('views').style.display = 'block';
  const now = new Date();
  document.getElementById('lastUpdateLabel').textContent =
    (usedFallback ? 'Dados de exemplo · ' : 'Atualizado ') + now.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  populateFilterOptions();
  applyFilters();
  renderAll();
}

/* ============ FILTERS ============ */
function populateFilterOptions(){
  const statuses = uniqSorted(RAW.map(p=>p.statusLabel));
  const tiers = uniqSorted(RAW.map(p=>'Tier '+p.tier));
  const areas = uniqSorted(RAW.map(p=>p.area));
  const gerentes = uniqSorted(RAW.flatMap(p=>p.gerenteList));
  const analistas = uniqSorted(RAW.flatMap(p=>p.analistaList));
  const pmos = uniqSorted(RAW.flatMap(p=>p.pmoList));
  const sponsors = uniqSorted(RAW.flatMap(p=>p.sponsorList));

  fillSelect('fStatus','Status: todos', statuses);
  fillSelect('fTier','Tier: todos', [1,2,3].map(t=>'Tier '+t));
  fillSelect('fArea','Área: todas', areas);
  fillSelect('fGerente','Gerente: todos', gerentes);
  fillSelect('fAnalista','Analista: todos', analistas);
  fillSelect('fPmo','PMO: todos', pmos);
  fillSelect('fSponsor','Sponsor: todos', sponsors);
}
function fillSelect(id, placeholder, options){
  const el = document.getElementById(id);
  el.innerHTML = '<option value="">'+placeholder+'</option>' + options.map(o=>'<option value="'+esc(o)+'">'+esc(o)+'</option>').join('');
}

function applyFilters(){
  const f = STATE.filters;
  FILTERED = RAW.filter(p=>{
    if(f.status && p.statusLabel !== f.status) return false;
    if(f.tier && ('Tier '+p.tier) !== f.tier) return false;
    if(f.area && p.area !== f.area) return false;
    if(f.gerente && !p.gerenteList.includes(f.gerente)) return false;
    if(f.analista && !p.analistaList.includes(f.analista)) return false;
    if(f.pmo && !p.pmoList.includes(f.pmo)) return false;
    if(f.sponsor && !p.sponsorList.includes(f.sponsor)) return false;
    if(f.q){
      const hay = [p.nome,p.id,p.area,...p.sponsorList,...p.gerenteList,...p.analistaList,...p.pmoList].join(' ').toLowerCase();
      if(!hay.includes(f.q.toLowerCase())) return false;
    }
    return true;
  });
}

/* ============ CAPACIDADE VIEW ============ */
function computeCapacity(){
  const map = {};
  RAW.forEach(p=>{
    p.analistaList.forEach(a=>{
      if(!map[a]) map[a] = {nome:a, projetos:[], weight:0, criticos:0, atencao:0};
      map[a].projetos.push(p);
      map[a].weight += CONFIG.CAPACITY_WEIGHTS[p.tier] || 1;
      if(p.statusBucket==='critico') map[a].criticos++;
      if(p.statusBucket==='atencao') map[a].atencao++;
    });
  });
  return Object.values(map).map(a=>{
    const pct = Math.round((a.weight / CONFIG.CAPACITY_TARGET) * 100);
    let level = 'green';
    if(pct>90) level='red'; else if(pct>=71) level='amber';
    return {...a, pct, level};
  }).sort((a,b)=>b.pct-a.pct);
}

function destroyChart(id){ if(CHARTS[id]){ CHARTS[id].destroy(); delete CHARTS[id]; } }
function countBy(arr, fn){
  const m = {};
  arr.forEach(item=>{
    const keys = fn(item);
    (Array.isArray(keys)?keys:[keys]).forEach(k=>{
      if(!k) return;
      m[k] = (m[k]||0)+1;
    });
  });
  return m;
}
const PALETTE = ['#2f6fed','#1f9d63','#dd8f1f','#d9364a','#7c5cd6','#0b8f9f','#c4587c','#4c8bf5'];
function buildCharts(){
  if(typeof Chart === 'undefined'){ return; }
  Chart.defaults.font.family = "'Inter',sans-serif";
  Chart.defaults.color = '#5b6472';

  destroyChart('chStatus');
  const statusCounts = countBy(RAW, p=>p.statusLabel);
  CHARTS.chStatus = new Chart(document.getElementById('chStatus'), {
    type:'doughnut',
    data:{ labels:Object.keys(statusCounts), datasets:[{data:Object.values(statusCounts), backgroundColor:PALETTE, borderWidth:2, borderColor:'#fff'}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10.5}}}}}
  });

  function hbar(id, counts, color){
    destroyChart(id);
    const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    CHARTS[id] = new Chart(document.getElementById(id), {
      type:'bar',
      data:{labels:entries.map(e=>e[0]), datasets:[{data:entries.map(e=>e[1]), backgroundColor:color, borderRadius:5}]},
      options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{ticks:{precision:0}}}}
    });
  }
  hbar('chArea', countBy(RAW, p=>p.area), '#2f6fed');
  hbar('chGerente', countBy(RAW, p=>p.gerenteList), '#1f9d63');
  hbar('chAnalista', countBy(RAW, p=>p.analistaList), '#dd8f1f');
  hbar('chPmo', countBy(RAW, p=>p.pmoList), '#7c5cd6');

  destroyChart('chEvoPlan');
  const withGap = RAW.filter(p=>p.evolucao!==null && p.planejado!==null)
    .map(p=>({...p, gap: p.evolucao - p.planejado}))
    .sort((a,b)=>a.gap-b.gap).slice(0,12);
  CHARTS.chEvoPlan = new Chart(document.getElementById('chEvoPlan'), {
    type:'bar',
    data:{ labels: withGap.map(p=>p.id),
      datasets:[
        {label:'Evolução', data:withGap.map(p=>p.evolucao), backgroundColor:'#2f6fed', borderRadius:4},
        {label:'Planejado', data:withGap.map(p=>p.planejado), backgroundColor:'#c7cedb', borderRadius:4}
      ]},
    options:{plugins:{legend:{position:'bottom'}}, scales:{x:{ticks:{font:{size:9}}}}}
  });

  destroyChart('chCapacidade');
  const analysts = computeCapacity();
  CHARTS.chCapacidade = new Chart(document.getElementById('chCapacidade'), {
    type:'bar',
    data:{labels:analysts.map(a=>a.nome), datasets:[{data:analysts.map(a=>a.pct), backgroundColor:analysts.map(a=>a.level==='red'?'#d9364a':a.level==='amber'?'#dd8f1f':'#1f9d63'), borderRadius:5}]},
    options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{ticks:{callback:v=>v+'%'}}}}
  });

  destroyChart('chCriticoArea');
  const criticoArea = countBy(RAW.filter(p=>p.statusBucket==='critico'), p=>p.area);
  CHARTS.chCriticoArea = new Chart(document.getElementById('chCriticoArea'), {
    type:'bar',
    data:{labels:Object.keys(criticoArea), datasets:[{data:Object.values(criticoArea), backgroundColor:'#d9364a', borderRadius:5}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{ticks:{precision:0}}}}
  });
}

/* ============ RISCOS VIEW ============ */
function renderRiscos(){
  const items = [];
  RAW.forEach(p=>{
    p.riscos.forEach(r=>{
      if(r.texto) items.push({p, ...r});
    });
    if(p.atrasado){
      items.push({p, severidade:'Alto', texto:'Evolução ('+p.evolucao+'%) abaixo do planejado ('+p.planejado+'%).', synthetic:true});
    }
  });
  const order = {'Alto':0,'Médio':1,'Baixo':2};
  items.sort((a,b)=>(order[a.severidade]??1)-(order[b.severidade]??1));
  const html = `
    <div class="section-head"><h2>Riscos & Pontos de Atenção (${items.length})</h2></div>
    ${items.map(it=>{
      const sevCls = it.severidade==='Alto'?'sev-alto':it.severidade==='Baixo'?'sev-baixo':'sev-medio';
      return `<div class="risk-item ${sevCls}" data-open="${esc(it.p.id)}">
        <div class="risk-item-top"><strong>${esc(it.p.nome)}</strong><span class="badge badge-${it.severidade==='Alto'?'red':it.severidade==='Baixo'?'green':'amber'}">${esc(it.severidade||'N/I')}</span></div>
        <p>${esc(it.texto)}</p>
      </div>`;
    }).join('') || '<div class="empty-state">Nenhum risco reportado.</div>'}
  `;
  document.getElementById('view-riscos').innerHTML = html;
}

/* ============ ONE PAGE MODAL ============ */
function openProject(id){
  const p = RAW.find(x=>x.id===id);
  if(!p) return;
  const barColor = p.statusCls==='red' ? 'var(--red)' : p.statusCls==='amber' ? 'var(--amber)' : 'var(--green)';
  const evo = p.evolucao ?? 0;
  const plan = p.planejado;

  const teamFields = [
    ['Sponsor', p.sponsorList.join(', ')],
    ['Líder técnico', p.liderList.join(', ')],
    ['Gerente do projeto', p.gerenteList.join(', ')],
    ['PMO', p.pmoList.join(', ')],
    ['Analista responsável', p.analistaList.join(', ')],
    ['Área de negócio', p.area],
  ].filter(([,v])=>v);

  const html = `
    <div class="op-header">
      <div class="op-header-top">
        <div>
          <div class="op-code">${esc(p.id)}</div>
          <div class="op-title">${esc(p.nome)}</div>
          ${p.objetivo ? `<div class="op-objetivo">Objetivo: ${esc(p.objetivo)}</div>` : ''}
        </div>
        <button class="op-close" id="opClose">✕</button>
      </div>
      <div class="op-badges-row">
        <div class="op-badges" style="margin-top:0">
          <span class="badge badge-${p.statusCls}">${esc(p.statusLabel)}</span>
          <span class="badge badge-neutral">Tier ${p.tier}</span>
          ${p.atrasado?'<span class="badge badge-red">⚠ Abaixo do planejado</span>':''}
        </div>
        <div class="op-updated">Atualizado em ${fmtDate(p.ultimaAtualizacao)}${p.responsavel?' por '+esc(p.responsavel):''}</div>
      </div>
    </div>
    <div class="op-body">

      <div class="op-progress-block">
        <div class="op-progress-top">
          <span class="lbl">Avanço físico</span>
          <span class="val" style="color:${barColor}">${p.evolucao??'—'}%</span>
        </div>
        <div class="op-progress-track">
          <div class="op-progress-fill" style="width:${Math.min(evo,100)}%;background:${barColor}"></div>
          ${plan!==null ? `<div class="op-progress-marker" style="left:${Math.min(plan,100)}%"></div>` : ''}
        </div>
        ${plan!==null ? `<div class="op-progress-sub"><span class="marker-dot"></span> Planejado: ${plan}%${p.atrasado?' · <span style="color:var(--red);font-weight:700">'+(evo-plan)+' pp abaixo do plano</span>':''}</div>` : ''}
      </div>

      ${p.resumo ? `<div class="op-resumo">${esc(p.resumo)}</div>` : ''}

      ${teamFields.length ? `
      <div class="op-team-grid">
        ${teamFields.map(([lbl,val])=>`<div class="op-team-card"><div class="lbl">${esc(lbl)}</div><div class="val">${esc(val)}</div></div>`).join('')}
      </div>` : ''}

      <div class="op-two">
        <div class="op-kv-card">
          <h4>Financeiro</h4>
          <div class="op-kv-row"><span class="k">Orçado CAPEX</span><span class="v">${fmtMoney(p.capex)}</span></div>
          <div class="op-kv-row"><span class="k">Orçado OPEX</span><span class="v">${fmtMoney(p.opex)}</span></div>
          <div class="op-kv-row"><span class="k">Realizado</span><span class="v">${p.realizadoTexto || fmtMoney(p.realizado)}</span></div>
          ${p.eac ? `<div class="op-kv-row"><span class="k">Projeção final (EAC)</span><span class="v">${esc(String(p.eac))}</span></div>` : ''}
        </div>
        <div class="op-kv-card">
          <h4>Cronograma macro</h4>
          <div class="op-kv-row"><span class="k">Início</span><span class="v">${fmtDate(p.dataInicio)}</span></div>
          <div class="op-kv-row"><span class="k">Fim previsto (baseline)</span><span class="v">${fmtDate(p.dataFimBaseline)}</span></div>
          <div class="op-kv-row"><span class="k">Fim projetado (atual)</span><span class="v">${fmtDate(p.dataFimAtual)}</span></div>
          <div class="op-kv-row"><span class="k">Fase atual</span><span class="v" style="font-family:var(--font-body);text-align:right">${esc(p.fase||'—')}</span></div>
          ${p.marcos.length ? `<div class="op-kv-sub"><span class="lbl2">Marcos</span><ul class="op-list">${p.marcos.map(m=>`<li>${esc(m)}</li>`).join('')}</ul></div>` : ''}
        </div>
      </div>

      <div class="op-two">
        <div class="op-section">
          <h4>Executado no período</h4>
          <ul class="op-list">${p.atividades.length ? p.atividades.map(a=>`<li>${esc(a)}</li>`).join('') : '<li>Nenhuma cadastrada.</li>'}</ul>
        </div>
        <div class="op-section">
          <h4>Próximas entregas</h4>
          <ul class="op-list">${p.proximas.length ? p.proximas.map(a=>`<li>${esc(a)}</li>`).join('') : '<li>Nenhuma cadastrada.</li>'}</ul>
        </div>
      </div>

      <div class="op-section" style="margin-bottom:0">
        <h4>Riscos e dependências</h4>
        ${p.riscos.length ? p.riscos.map(r=>`<div class="op-risk"><span class="badge badge-${r.severidade==='Alto'?'red':r.severidade==='Baixo'?'green':'amber'}">${esc(r.severidade||'N/I')}</span> ${esc(r.texto)}</div>`).join('') : '<p style="font-size:12.5px;color:var(--text-muted)">Nenhum risco reportado.</p>'}
      </div>
    </div>
  `;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('opClose').addEventListener('click', closeModal);
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

/* ============ SIDEBAR MOBILE ============ */
function closeSidebarMobile(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarScrim').classList.remove('open');
}

/* ============ EVENTS ============ */
document.addEventListener('DOMContentLoaded', () => {
  loadData();

  document.getElementById('mainNav').addEventListener('click', (e)=>{
    const btn = e.target.closest('.nav-item');
    if(btn) goTo(btn.dataset.route);
  });

  document.getElementById('refreshBtn').addEventListener('click', ()=>{
    document.getElementById('refreshIcon').classList.add('loading');
    loadData();
    setTimeout(()=>document.getElementById('refreshIcon').classList.remove('loading'), 600);
  });

  document.getElementById('hamburger').addEventListener('click', ()=>{
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarScrim').classList.toggle('open');
  });
  document.getElementById('sidebarScrim').addEventListener('click', closeSidebarMobile);

  ['fStatus','fTier','fArea','fGerente','fAnalista','fPmo','fSponsor'].forEach(id=>{
    document.getElementById(id).addEventListener('change', (e)=>{
      const map = {fStatus:'status',fTier:'tier',fArea:'area',fGerente:'gerente',fAnalista:'analista',fPmo:'pmo',fSponsor:'sponsor'};
      STATE.filters[map[id]] = e.target.value;
      applyFilters();
      renderView(STATE.route);
    });
  });
  document.getElementById('globalSearch').addEventListener('input', (e)=>{
    STATE.filters.q = e.target.value;
    applyFilters();
    if(STATE.route!=='projetos') goTo('projetos'); else renderProjetos();
  });
  document.getElementById('clearFilters').addEventListener('click', ()=>{
    STATE.filters = {status:'', tier:'', area:'', gerente:'', analista:'', pmo:'', sponsor:'', q:''};
    document.getElementById('globalSearch').value = '';
    ['fStatus','fTier','fArea','fGerente','fAnalista','fPmo','fSponsor'].forEach(id=>document.getElementById(id).value='');
    applyFilters();
    renderView(STATE.route);
  });

  document.getElementById('modalOverlay').addEventListener('click', (e)=>{
    if(e.target.id==='modalOverlay') closeModal();
  });
  document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

  // event delegation for open-project / filter-sponsor clicks
  document.getElementById('viewContainer').addEventListener('click', (e)=>{
    const openEl = e.target.closest('[data-open]');
    if(openEl){ openProject(openEl.dataset.open); return; }
    const sponsorEl = e.target.closest('[data-filter-sponsor]');
    if(sponsorEl){
      document.getElementById('fSponsor').value = sponsorEl.dataset.filterSponsor;
      STATE.filters.sponsor = sponsorEl.dataset.filterSponsor;
      applyFilters();
      goTo('projetos');
      return;
    }
    const analistaEl = e.target.closest('[data-open-analista]');
    if(analistaEl){
      document.getElementById('fAnalista').value = analistaEl.dataset.openAnalista;
      STATE.filters.analista = analistaEl.dataset.openAnalista;
      applyFilters();
      goTo('projetos');
    }
    const ownerHead = e.target.closest('.owner-header');
    if(ownerHead){
      const table = ownerHead.nextElementSibling;
      table.style.display = table.style.display==='none' ? 'table' : 'none';
    }
  });

  goTo('home');
});

</script>
</body>
</html>
